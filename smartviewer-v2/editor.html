<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>SmartCatalog Hotspot Editor</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #eef2f7;
      --surface: #ffffff;
      --surface-soft: #f7f9fc;
      --ink: #101828;
      --muted: #667085;
      --line: #d9e1ec;
      --brand: #2563eb;
      --brand-strong: #1d4ed8;
      --danger: #dc2626;
      --shadow: 0 18px 55px rgba(15, 23, 42, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: Arial, sans-serif;
    }

    body {
      display: grid;
      grid-template-rows: auto 1fr;
      overflow: hidden;
    }

    header {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) auto;
      gap: 16px;
      align-items: center;
      padding: 14px 18px;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.08);
      z-index: 10;
    }

    h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1.2;
    }

    #subtitle {
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
    }

    #topActions {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button,
    select,
    input,
    textarea {
      font: inherit;
    }

    button {
      min-height: 38px;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 8px;
      background: #111827;
      color: #fff;
      cursor: pointer;
      font-weight: 800;
      padding: 0 12px;
    }

    button.secondary {
      background: #eef2f7;
      color: var(--ink);
    }

    button.danger {
      background: var(--danger);
    }

    button:disabled {
      cursor: not-allowed;
      opacity: 0.5;
    }

    main {
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 360px;
      gap: 14px;
      padding: 14px;
      overflow: hidden;
    }

    #workspace {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
    }

    #pageToolbar {
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    #pageCanvasWrap {
      min-height: 0;
      overflow: auto;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(135deg, rgba(255,255,255,0.62), rgba(255,255,255,0)),
        #dfe5ee;
    }

    #pageCanvas {
      position: relative;
      width: min(100%, 780px);
      background: #fff;
      box-shadow: var(--shadow);
      touch-action: none;
      user-select: none;
    }

    #pageImage {
      width: 100%;
      display: block;
      pointer-events: none;
      -webkit-user-drag: none;
    }

    .hotspot {
      position: absolute;
      border: var(--hotspot-border-width, 2px) solid var(--hotspot-border-color, #2563eb);
      border-radius: 6px;
      background: var(--hotspot-fill, rgba(37, 99, 235, 0.12));
      cursor: pointer;
      touch-action: none;
    }

    .hotspot.selected {
      border-color: #f97316;
      background: rgba(249, 115, 22, 0.16);
    }

    .hotspot.moving {
      cursor: grabbing;
      box-shadow: 0 12px 30px rgba(37, 99, 235, 0.24);
    }

    .resizeHandle {
      position: absolute;
      width: 18px;
      height: 18px;
      border: 2px solid #fff;
      border-radius: 999px;
      background: #f97316;
      box-shadow: 0 6px 16px rgba(15, 23, 42, 0.28);
      touch-action: none;
    }

    .resizeHandle[data-handle="nw"] {
      top: -10px;
      left: -10px;
      cursor: nwse-resize;
    }

    .resizeHandle[data-handle="ne"] {
      top: -10px;
      right: -10px;
      cursor: nesw-resize;
    }

    .resizeHandle[data-handle="sw"] {
      bottom: -10px;
      left: -10px;
      cursor: nesw-resize;
    }

    .resizeHandle[data-handle="se"] {
      right: -10px;
      bottom: -10px;
      cursor: nwse-resize;
    }

    .controlGrid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    input[type="color"] {
      min-height: 38px;
      padding: 4px;
      cursor: pointer;
    }

    input[type="range"] {
      padding: 0;
    }

    .draft {
      position: absolute;
      border: 2px dashed #111827;
      border-radius: 6px;
      background: rgba(17, 24, 39, 0.08);
      pointer-events: none;
    }

    aside {
      min-height: 0;
      overflow: auto;
      display: grid;
      grid-template-rows: auto auto 1fr;
      gap: 12px;
    }

    .panel {
      padding: 14px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    .mobileOnly {
      display: none;
    }

    #mobileSheetHandle {
      position: relative;
      width: 112px;
      height: 32px;
      margin: 0 auto 10px;
      min-height: 32px;
      padding: 0;
      border: 0;
      border-radius: 999px;
      background: transparent;
      box-shadow: none;
      cursor: grab;
      touch-action: none;
    }

    #mobileSheetHandle::before {
      content: "";
      position: absolute;
      top: 13px;
      left: 32px;
      width: 48px;
      height: 5px;
      border-radius: 999px;
      background: #cbd5e1;
    }

    #mobileSheetHandle:active {
      cursor: grabbing;
    }

    #mobileTools {
      display: none;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
    }

    #mobileTools button {
      flex: 1;
      min-width: 0;
      padding: 0 8px;
      font-size: 13px;
    }

    #mobileTools button.active {
      background: var(--brand);
      color: #fff;
    }

    #mobileSheetActions {
      display: none;
      gap: 8px;
      margin-bottom: 8px;
    }

    #mobileSheetActions button {
      flex: 1;
    }

    #mobileSheetTabs {
      display: none;
      gap: 8px;
      margin-bottom: 10px;
    }

    #mobileSheetTabs button {
      flex: 1;
      background: #eef2f7;
      color: var(--ink);
    }

    #mobileSheetTabs button.active {
      background: #111827;
      color: #fff;
    }

    #mobileStatusToast {
      display: none;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 15px;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field.hidden {
      display: none;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #fff;
      color: var(--ink);
      padding: 8px 10px;
    }

    textarea {
      min-height: 72px;
      resize: vertical;
    }

    #status {
      min-height: 18px;
      color: var(--muted);
      font-size: 13px;
    }

    #hotspotList {
      display: grid;
      gap: 8px;
    }

    .listItem {
      width: 100%;
      min-height: auto;
      display: grid;
      gap: 3px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      color: var(--ink);
      text-align: left;
      box-shadow: none;
    }

    .listItem strong {
      font-size: 13px;
    }

    .listItem span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 400;
    }

    .row {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .hint {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .imageGrid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .imageTile {
      position: relative;
      aspect-ratio: 1;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface-soft);
      overflow: hidden;
    }

    .imageTile img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .imageTile button {
      position: absolute;
      top: 4px;
      right: 4px;
      min-height: 26px;
      padding: 0 8px;
      border-radius: 6px;
      font-size: 12px;
      background: rgba(15, 23, 42, 0.82);
      color: #fff;
      box-shadow: none;
    }

    input[type="file"] {
      padding: 10px;
      background: #fff;
      cursor: pointer;
    }

    @media (max-width: 980px) {
      html,
      body {
        background: #0f172a;
      }

      body {
        overflow: hidden;
      }

      header {
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        min-height: 56px;
        padding: calc(6px + env(safe-area-inset-top)) 10px 6px;
        background: rgba(15, 23, 42, 0.98);
        border-bottom: 0;
        box-shadow: none;
      }

      h1 {
        color: #fff;
        font-size: 16px;
        letter-spacing: 0;
      }

      #subtitle {
        display: none;
      }

      #topActions {
        display: flex;
        gap: 6px;
      }

      #topActions button {
        min-height: 34px;
        border-color: rgba(255, 255, 255, 0.14);
        border-radius: 999px;
        padding: 0 10px;
        font-size: 12px;
        box-shadow: none;
      }

      #topActions .secondary {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      button {
        min-height: 40px;
        border-radius: 999px;
        font-size: 13px;
        padding: 0 10px;
      }

      main {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr;
        gap: 0;
        padding: 0;
        overflow: hidden;
      }

      #workspace {
        position: relative;
        display: block;
        min-height: 0;
        overflow: hidden;
      }

      #pageToolbar {
        position: absolute;
        top: 12px;
        right: 14px;
        left: 14px;
        z-index: 20;
        display: grid;
        grid-template-columns: minmax(0, 1fr) 40px 40px;
        gap: 6px;
        padding: 6px;
        border: 1px solid rgba(148, 163, 184, 0.28);
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 12px 28px rgba(15, 23, 42, 0.22);
        backdrop-filter: blur(14px);
      }

      #pageToolbar label {
        display: none;
      }

      #pageToolbar .hint {
        display: none;
      }

      input,
      select,
      textarea {
        min-height: 40px;
        font-size: 16px;
        padding: 7px 9px;
      }

      #pageToolbar select {
        min-height: 36px;
        border: 0;
        background: transparent;
        font-weight: 800;
      }

      #pageToolbar button {
        min-width: 40px;
        min-height: 36px;
        padding: 0;
      }

      #mobileTools {
        position: absolute;
        right: 14px;
        bottom: calc(14px + env(safe-area-inset-bottom));
        left: 14px;
        z-index: 31;
        display: grid;
        grid-template-columns: 1.2fr 1fr 1fr;
        gap: 8px;
        padding: 7px;
        border: 1px solid rgba(226, 232, 240, 0.76);
        border-radius: 18px;
        background: rgba(248, 250, 252, 0.94);
        box-shadow: 0 16px 36px rgba(15, 23, 42, 0.24);
        backdrop-filter: blur(16px);
      }

      #mobileTools button {
        min-height: 42px;
        padding: 0 8px;
        border-radius: 14px;
        box-shadow: none;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #mobileDeleteBtn {
        color: #dc2626;
      }

      body.editor-panel-open #mobileTools {
        display: none;
      }

      #mobileStatusToast.show {
        position: absolute;
        right: 20px;
        bottom: calc(68px + env(safe-area-inset-bottom));
        left: 20px;
        z-index: 31;
        display: block;
        min-height: 20px;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.76);
        color: #fff;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #pageCanvasWrap {
        height: calc(100vh - 56px);
        height: calc(100dvh - 56px);
        max-height: none;
        padding: 70px 10px calc(76px + env(safe-area-inset-bottom));
        border: 0;
        border-radius: 0;
        align-items: flex-start;
        justify-content: center;
        background:
          radial-gradient(circle at top, rgba(59, 130, 246, 0.28), transparent 34%),
          linear-gradient(180deg, #172033 0%, #0f172a 100%);
        -webkit-overflow-scrolling: touch;
        overscroll-behavior: contain;
        touch-action: pan-x pan-y;
      }

      #pageCanvasWrap.zoomed {
        justify-content: flex-start;
      }

      #pageCanvas {
        width: var(--mobile-canvas-width, 100%);
        max-width: none;
        border-radius: 10px;
        overflow: hidden;
        box-shadow: 0 22px 70px rgba(0, 0, 0, 0.42);
        touch-action: pan-x pan-y;
      }

      #pageCanvas.mobile-placing {
        cursor: crosshair;
        outline: 3px solid rgba(37, 99, 235, 0.75);
        outline-offset: 4px;
        touch-action: none;
      }

      #pageCanvas.mobile-placing::after {
        content: "Tippen, um Hotspot zu platzieren";
        position: absolute;
        right: 12px;
        bottom: 12px;
        left: 12px;
        z-index: 4;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(15, 23, 42, 0.82);
        color: #fff;
        font-size: 13px;
        font-weight: 800;
        text-align: center;
        pointer-events: none;
      }

      .hotspot {
        min-width: 34px;
        min-height: 34px;
      }

      .hotspot.selected {
        box-shadow: 0 0 0 4px rgba(249, 115, 22, 0.18);
      }

      .resizeHandle {
        width: 30px;
        height: 30px;
      }

      .resizeHandle[data-handle="nw"] {
        top: -16px;
        left: -16px;
      }

      .resizeHandle[data-handle="ne"] {
        top: -16px;
        right: -16px;
      }

      .resizeHandle[data-handle="sw"] {
        bottom: -16px;
        left: -16px;
      }

      .resizeHandle[data-handle="se"] {
        right: -16px;
        bottom: -16px;
      }

      aside {
        position: fixed;
        right: 0;
        bottom: 0;
        left: 0;
        z-index: 70;
        max-height: calc(100vh - 54px);
        max-height: calc(100dvh - 54px);
        display: block;
        overflow: auto;
        padding: 10px 12px calc(20px + env(safe-area-inset-bottom));
        border-top: 1px solid rgba(226, 232, 240, 0.9);
        border-radius: 22px 22px 0 0;
        background: #f8fafc;
        box-shadow: 0 -28px 70px rgba(0, 0, 0, 0.38);
        transform: translateY(100%);
        transition: transform 220ms ease;
      }

      aside.open {
        transform: translateY(0);
      }

      aside.sheet-dragging {
        transition: none;
      }

      aside:not(.open) {
        pointer-events: none;
        overflow: hidden;
        transform: translateY(100%);
        padding-bottom: 0;
        box-shadow: none;
      }

      aside:not(.open) #mobileSheetHandle,
      aside:not(.open) #mobileSheetActions,
      aside:not(.open) .panel {
        display: none;
      }

      aside .panel {
        margin-bottom: 8px;
        padding: 12px;
        border-radius: 16px;
        box-shadow: none;
      }

      aside .panel:first-of-type {
        padding-top: 8px;
      }

      .panel h2 {
        font-size: 18px;
      }

      .field {
        margin-bottom: 8px;
      }

      label {
        font-size: 13px;
      }

      #status,
      .hint,
      .listItem span {
        font-size: 13px;
      }

      .mobileOnly {
        display: block;
      }

      #mobileSheetActions {
        position: sticky;
        top: -10px;
        z-index: 2;
        display: flex;
        gap: 8px;
        padding: 8px 0;
        background: #f8fafc;
      }

      #mobileSheetActions button {
        min-height: 40px;
        border-radius: 14px;
      }

      #mobileSheetTabs {
        display: flex;
        padding: 4px;
        margin-bottom: 8px;
        border-radius: 16px;
        background: #e2e8f0;
      }

      aside[data-mobile-tab="content"] [data-mobile-section="style"],
      aside[data-mobile-tab="style"] [data-mobile-section="content"] {
        display: none;
      }

      aside .panel:nth-of-type(2),
      aside .panel:nth-of-type(3) {
        display: none;
      }

      #mobileSheetTabs button {
        min-height: 38px;
        border-radius: 13px;
      }

      .controlGrid {
        grid-template-columns: 1fr;
      }

      .row button {
        flex: 1;
      }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>Hotspot Editor</h1>
      <div id="subtitle">Katalog wird geladen...</div>
    </div>
    <div id="topActions">
      <button type="button" class="secondary" id="openViewerBtn">Viewer öffnen</button>
      <button type="button" id="saveBtn">Speichern</button>
    </div>
  </header>

  <main>
    <section id="workspace">
      <div id="pageToolbar">
        <label for="pageSelect">Seite</label>
        <select id="pageSelect"></select>
        <button type="button" class="secondary" id="prevPageBtn">←</button>
        <button type="button" class="secondary" id="nextPageBtn">→</button>
        <p class="hint">Zum Erstellen eines Hotspots auf der Seite ziehen.</p>
      </div>

      <div id="mobileTools">
        <button type="button" class="secondary" id="mobileAddBtn">Hinzufügen</button>
        <button type="button" class="secondary" id="mobileDetailsBtn">Details</button>
        <button type="button" class="secondary" id="mobileDeleteBtn">Löschen</button>
      </div>
      <div id="mobileStatusToast" aria-live="polite"></div>

      <div id="pageCanvasWrap">
        <div id="pageCanvas">
          <img id="pageImage" alt="" />
        </div>
      </div>
    </section>

    <aside id="editorPanel">
      <button type="button" id="mobileSheetHandle" class="mobileOnly" aria-label="Details schließen"></button>
      <div id="mobileSheetActions" class="mobileOnly">
        <button type="button" class="secondary" id="mobileCollapseBtn">Schließen</button>
        <button type="button" id="mobilePanelSaveBtn">Speichern</button>
      </div>
      <div id="mobileSheetTabs" class="mobileOnly">
        <button type="button" class="active" id="mobileContentTabBtn">Inhalt</button>
        <button type="button" id="mobileStyleTabBtn">Stil</button>
      </div>
      <section class="panel">
        <h2>Ausgewählter Hotspot</h2>
        <div class="field" data-mobile-section="content">
          <label for="typeInput">Typ</label>
          <select id="typeInput">
            <option value="link">Link</option>
            <option value="product">Produkt</option>
            <option value="page">Seitensprung</option>
            <option value="video">Video</option>
            <option value="note">Notiz</option>
          </select>
        </div>
        <div class="field" data-field="title" data-mobile-section="content">
          <label for="titleInput">Titel</label>
          <input id="titleInput" placeholder="z. B. Angebot ansehen" />
        </div>
        <div class="field" data-field="url" data-mobile-section="content">
          <label id="urlLabel" for="urlInput">URL</label>
          <input id="urlInput" placeholder="https://..." />
        </div>
        <div class="field" data-field="targetPage" data-mobile-section="content">
          <label for="targetPageInput">Zielseite</label>
          <input id="targetPageInput" type="number" min="1" placeholder="Nur bei Seitensprung" />
        </div>
        <div class="field" data-field="productImageUrl" data-mobile-section="content">
          <label for="imageUrlInput">Produktbild URL</label>
          <input id="imageUrlInput" placeholder="https://.../produktbild.jpg" />
        </div>
        <div class="field" data-field="productImages" data-mobile-section="content">
          <label for="imageUploadInput">Produktbilder hochladen</label>
          <input id="imageUploadInput" type="file" accept="image/jpeg,image/png,image/webp,image/gif" multiple />
          <p class="hint">Maximal 3 Bilder pro Produkt, je 3 MB. JPG, PNG, WEBP oder GIF.</p>
          <div id="productImageList" class="imageGrid"></div>
        </div>
        <div class="field" data-field="price" data-mobile-section="content">
          <label for="priceInput">Preis</label>
          <input id="priceInput" placeholder="z. B. 9,99 EUR" />
        </div>
        <div class="field" data-field="description" data-mobile-section="content">
          <label for="descriptionInput">Beschreibung</label>
          <textarea id="descriptionInput" placeholder="Kurze Produktbeschreibung"></textarea>
        </div>
        <div class="field" data-field="appearance" data-mobile-section="style">
          <label>Darstellung</label>
          <div class="controlGrid">
            <div>
              <label for="fillColorInput">Fuellfarbe</label>
              <input id="fillColorInput" type="color" value="#2563eb" />
            </div>
            <div>
              <label for="borderColorInput">Rahmenfarbe</label>
              <input id="borderColorInput" type="color" value="#2563eb" />
            </div>
          </div>
          <label for="fillOpacityInput">Fuell-Transparenz: <span id="fillOpacityValue">12%</span></label>
          <input id="fillOpacityInput" type="range" min="0" max="50" value="12" />
          <label for="borderWidthInput">Rahmenstaerke</label>
          <select id="borderWidthInput">
            <option value="1">Fein</option>
            <option value="2" selected>Normal</option>
            <option value="3">Stark</option>
            <option value="4">Sehr stark</option>
          </select>
        </div>
        <div class="row" data-mobile-section="style">
          <button type="button" class="danger" id="deleteBtn">Löschen</button>
          <button type="button" class="secondary" id="clearBtn">Auswahl aufheben</button>
        </div>
      </section>

      <section class="panel">
        <h2>Status</h2>
        <div id="status">Bereit.</div>
      </section>

      <section class="panel">
        <h2>Hotspots</h2>
        <div id="hotspotList"></div>
      </section>
    </aside>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const API_BASE = params.get("api_base") || window.location.origin;
    const catalogId = params.get("catalog") || "";
    const catalogItemId = params.get("id") || params.get("catalog_item_id") || "";
    const editorToken = params.get("edit_token") || "";
    const customerToken =
      params.get("token") ||
      localStorage.getItem("smartcatalog_customer_token") ||
      localStorage.getItem("customerToken") ||
      localStorage.getItem("token") ||
      "";

    const state = {
      catalog: null,
      pages: [],
      hotspots: [],
      currentPage: 1,
      selectedId: "",
      draft: null,
      drawing: false,
      drawStart: null,
      interaction: null,
      pinch: null,
      sheetDrag: null,
      ignoreSheetClick: false,
      zoom: 1,
      mobileTab: "content",
      mobilePlacing: false,
      dirty: false
    };

    const el = {
      subtitle: document.getElementById("subtitle"),
      pageSelect: document.getElementById("pageSelect"),
      pageCanvasWrap: document.getElementById("pageCanvasWrap"),
      pageCanvas: document.getElementById("pageCanvas"),
      pageImage: document.getElementById("pageImage"),
      editorPanel: document.getElementById("editorPanel"),
      mobileSheetHandle: document.getElementById("mobileSheetHandle"),
      mobileCollapseBtn: document.getElementById("mobileCollapseBtn"),
      mobilePanelSaveBtn: document.getElementById("mobilePanelSaveBtn"),
      mobileContentTabBtn: document.getElementById("mobileContentTabBtn"),
      mobileStyleTabBtn: document.getElementById("mobileStyleTabBtn"),
      status: document.getElementById("status"),
      hotspotList: document.getElementById("hotspotList"),
      saveBtn: document.getElementById("saveBtn"),
      mobileAddBtn: document.getElementById("mobileAddBtn"),
      mobileDetailsBtn: document.getElementById("mobileDetailsBtn"),
      mobileDeleteBtn: document.getElementById("mobileDeleteBtn"),
      mobileStatusToast: document.getElementById("mobileStatusToast"),
      openViewerBtn: document.getElementById("openViewerBtn"),
      typeInput: document.getElementById("typeInput"),
      titleInput: document.getElementById("titleInput"),
      urlLabel: document.getElementById("urlLabel"),
      urlInput: document.getElementById("urlInput"),
      targetPageInput: document.getElementById("targetPageInput"),
      imageUrlInput: document.getElementById("imageUrlInput"),
      imageUploadInput: document.getElementById("imageUploadInput"),
      productImageList: document.getElementById("productImageList"),
      priceInput: document.getElementById("priceInput"),
      descriptionInput: document.getElementById("descriptionInput"),
      fillColorInput: document.getElementById("fillColorInput"),
      borderColorInput: document.getElementById("borderColorInput"),
      fillOpacityInput: document.getElementById("fillOpacityInput"),
      fillOpacityValue: document.getElementById("fillOpacityValue"),
      borderWidthInput: document.getElementById("borderWidthInput"),
      fields: {
        title: document.querySelector('[data-field="title"]'),
        url: document.querySelector('[data-field="url"]'),
        targetPage: document.querySelector('[data-field="targetPage"]'),
        productImageUrl: document.querySelector('[data-field="productImageUrl"]'),
        productImages: document.querySelector('[data-field="productImages"]'),
        price: document.querySelector('[data-field="price"]'),
        description: document.querySelector('[data-field="description"]'),
        appearance: document.querySelector('[data-field="appearance"]')
      }
    };

    function setStatus(message) {
      el.status.innerText = message;
      if (el.mobileStatusToast) {
        el.mobileStatusToast.innerText = message;
        el.mobileStatusToast.classList.toggle("show", Boolean(message));
      }
    }

    function canSave() {
      return Boolean(editorToken || (catalogItemId && customerToken));
    }

    function showField(fieldName, visible) {
      el.fields[fieldName]?.classList.toggle("hidden", !visible);
    }

    function updateFieldVisibility(type = "link") {
      const isLink = type === "link";
      const isProduct = type === "product";
      const isPage = type === "page";
      const isVideo = type === "video";
      const isNote = type === "note";

      showField("title", true);
      showField("url", isLink || isProduct || isVideo);
      showField("targetPage", isPage);
      showField("productImageUrl", isProduct);
      showField("productImages", isProduct);
      showField("price", isProduct);
      showField("description", isProduct || isNote);

      el.urlLabel.innerText = isProduct
        ? "Produktlink / Shop URL"
        : isVideo
          ? "Video URL"
          : "URL";
      el.urlInput.placeholder = isProduct
        ? "https://.../produkt"
        : isVideo
          ? "https://.../video"
          : "https://...";
      el.titleInput.placeholder = isPage
        ? "z. B. Zu Seite 4"
        : isNote
          ? "z. B. Hinweis"
          : "z. B. Angebot ansehen";
      el.descriptionInput.placeholder = isNote
        ? "Kurzer Hinweistext"
        : "Kurze Produktbeschreibung";
    }

    function authHeaders(authToken = customerToken) {
      return authToken ? { Authorization: `Bearer ${authToken}` } : {};
    }

    function hotspotEndpoint() {
      if (editorToken) {
        return `${API_BASE}/api/smartviewer-v2/editor/catalogs/${catalogId}/hotspots`;
      }

      return `${API_BASE}/api/customer/catalogs/${catalogItemId}/hotspots`;
    }

    function productImageEndpoint(hotspotId) {
      if (editorToken) {
        return `${API_BASE}/api/smartviewer-v2/editor/catalogs/${catalogId}/hotspots/${encodeURIComponent(hotspotId)}/images`;
      }

      return `${API_BASE}/api/customer/catalogs/${catalogItemId}/hotspots/${encodeURIComponent(hotspotId)}/images`;
    }

    function hotspotAuthHeaders() {
      return authHeaders(editorToken || customerToken);
    }

    function currentHotspot() {
      return state.hotspots.find((hotspot) => hotspot.id === state.selectedId) || null;
    }

    function pageHotspots() {
      return state.hotspots.filter((hotspot) => Number(hotspot.page) === state.currentPage);
    }

    function makeId() {
      return `hotspot-${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function clamp(value) {
      return Math.max(0, Math.min(1, value));
    }

    function getRelativePoint(event) {
      const rect = el.pageCanvas.getBoundingClientRect();
      return {
        x: clamp((event.clientX - rect.left) / rect.width),
        y: clamp((event.clientY - rect.top) / rect.height)
      };
    }

    function normalizeRect(start, end) {
      const left = Math.min(start.x, end.x);
      const top = Math.min(start.y, end.y);
      const width = Math.abs(end.x - start.x);
      const height = Math.abs(end.y - start.y);
      return { left, top, width, height };
    }

    function isMobileEditor() {
      return window.matchMedia("(max-width: 980px)").matches;
    }

    function openEditorPanel(open = true) {
      if (!open && document.activeElement instanceof HTMLElement) {
        document.activeElement.blur();
      }
      if (el.editorPanel) {
        el.editorPanel.style.transform = "";
        el.editorPanel.classList.remove("sheet-dragging");
      }
      el.editorPanel?.classList.toggle("open", open);
      document.body.classList.toggle("editor-panel-open", Boolean(open && isMobileEditor()));
    }

    function startSheetDrag(event) {
      if (!isMobileEditor() || !el.editorPanel?.classList.contains("open")) return;
      state.sheetDrag = {
        pointerId: event.pointerId,
        startY: event.clientY,
        lastY: event.clientY,
        startedAt: performance.now(),
        moved: false
      };
      el.editorPanel.classList.add("sheet-dragging");
      el.mobileSheetHandle.setPointerCapture?.(event.pointerId);
      event.preventDefault();
    }

    function moveSheetDrag(event) {
      const drag = state.sheetDrag;
      if (!drag || drag.pointerId !== event.pointerId) return;
      const deltaY = Math.max(0, event.clientY - drag.startY);
      drag.lastY = event.clientY;
      drag.moved = drag.moved || deltaY > 8;
      el.editorPanel.style.transform = `translateY(${deltaY}px)`;
      event.preventDefault();
    }

    function endSheetDrag(event) {
      const drag = state.sheetDrag;
      if (!drag || drag.pointerId !== event.pointerId) return;
      const deltaY = Math.max(0, drag.lastY - drag.startY);
      const elapsed = Math.max(1, performance.now() - drag.startedAt);
      const velocity = deltaY / elapsed;
      state.sheetDrag = null;
      el.editorPanel.classList.remove("sheet-dragging");
      el.editorPanel.style.transform = "";

      if (deltaY > 90 || velocity > 0.55) {
        openEditorPanel(false);
        setStatus("Details geschlossen.");
      } else {
        openEditorPanel(true);
      }

      if (drag.moved) {
        state.ignoreSheetClick = true;
        setTimeout(() => {
          state.ignoreSheetClick = false;
        }, 0);
        event.preventDefault();
      }
    }

    function setMobileTab(tab = "content") {
      state.mobileTab = tab === "style" ? "style" : "content";
      el.editorPanel?.setAttribute("data-mobile-tab", state.mobileTab);
      el.mobileContentTabBtn?.classList.toggle("active", state.mobileTab === "content");
      el.mobileStyleTabBtn?.classList.toggle("active", state.mobileTab === "style");
    }

    function setMobilePlacing(active = true) {
      state.mobilePlacing = Boolean(active);
      el.pageCanvas?.classList.toggle("mobile-placing", state.mobilePlacing);
      el.mobileAddBtn?.classList.toggle("active", state.mobilePlacing);
      if (el.mobileAddBtn && isMobileEditor()) {
        el.mobileAddBtn.innerText = state.mobilePlacing ? "Setzen" : "Hinzufügen";
      }
    }

    function setEditorZoom(value, anchor = null) {
      const maxZoom = isMobileEditor() ? 4 : 2.5;
      const nextZoom = Math.max(1, Math.min(maxZoom, Number(value) || 1));
      const previousZoom = state.zoom;
      const wrapRect = el.pageCanvasWrap?.getBoundingClientRect();
      const previousLeft = el.pageCanvasWrap?.scrollLeft || 0;
      const previousTop = el.pageCanvasWrap?.scrollTop || 0;
      const anchorX = anchor && wrapRect ? anchor.x - wrapRect.left + previousLeft : null;
      const anchorY = anchor && wrapRect ? anchor.y - wrapRect.top + previousTop : null;
      state.zoom = nextZoom;

      if (isMobileEditor()) {
        el.pageCanvas.style.setProperty("--mobile-canvas-width", `${Math.round(nextZoom * 100)}%`);
      } else {
        el.pageCanvas.style.removeProperty("--mobile-canvas-width");
      }

      el.pageCanvasWrap?.classList.toggle("zoomed", nextZoom > 1.01);
      if (isMobileEditor() && el.pageCanvasWrap && previousZoom > 0 && Math.abs(previousZoom - nextZoom) > 0.01) {
        requestAnimationFrame(() => {
          const ratio = nextZoom / previousZoom;
          if (anchorX !== null && anchorY !== null && wrapRect) {
            el.pageCanvasWrap.scrollLeft = anchorX * ratio - (anchor.x - wrapRect.left);
            el.pageCanvasWrap.scrollTop = anchorY * ratio - (anchor.y - wrapRect.top);
          } else {
            el.pageCanvasWrap.scrollLeft = previousLeft * ratio;
            el.pageCanvasWrap.scrollTop = previousTop * ratio;
          }
        });
      }
    }

    function zoomBy(delta) {
      setEditorZoom(state.zoom + delta);
    }

    function moveRect(rect, dx, dy) {
      return {
        ...rect,
        left: clamp(Math.min(1 - rect.width, Math.max(0, rect.left + dx))),
        top: clamp(Math.min(1 - rect.height, Math.max(0, rect.top + dy)))
      };
    }

    function resizeRect(rect, dx, dy, handle) {
      const minSize = isMobileEditor() ? 0.035 : 0.015;
      let left = rect.left;
      let top = rect.top;
      let right = rect.left + rect.width;
      let bottom = rect.top + rect.height;

      if (handle.includes("w")) left = clamp(left + dx);
      if (handle.includes("e")) right = clamp(right + dx);
      if (handle.includes("n")) top = clamp(top + dy);
      if (handle.includes("s")) bottom = clamp(bottom + dy);

      if (right - left < minSize) {
        if (handle.includes("w")) left = right - minSize;
        if (handle.includes("e")) right = left + minSize;
      }

      if (bottom - top < minSize) {
        if (handle.includes("n")) top = bottom - minSize;
        if (handle.includes("s")) bottom = top + minSize;
      }

      left = clamp(left);
      top = clamp(top);
      right = clamp(Math.max(right, left + minSize));
      bottom = clamp(Math.max(bottom, top + minSize));

      return {
        left,
        top,
        width: Math.min(1 - left, right - left),
        height: Math.min(1 - top, bottom - top)
      };
    }

    function defaultRectAt(point) {
      const width = isMobileEditor() ? 0.34 : 0.24;
      const height = isMobileEditor() ? 0.12 : 0.1;
      return {
        left: clamp(Math.min(1 - width, Math.max(0, point.x - width / 2))),
        top: clamp(Math.min(1 - height, Math.max(0, point.y - height / 2))),
        width,
        height
      };
    }

    function hexToRgba(hex, opacity) {
      const safeHex = /^#[0-9a-f]{6}$/i.test(hex) ? hex : "#2563eb";
      const value = Number.parseInt(safeHex.slice(1), 16);
      const red = (value >> 16) & 255;
      const green = (value >> 8) & 255;
      const blue = value & 255;
      const alpha = Math.max(0, Math.min(0.5, Number(opacity) || 0));

      return `rgba(${red}, ${green}, ${blue}, ${alpha})`;
    }

    function normalizeStyle(style = {}) {
      return {
        fill_color: /^#[0-9a-f]{6}$/i.test(style.fill_color) ? style.fill_color : "#2563eb",
        border_color: /^#[0-9a-f]{6}$/i.test(style.border_color) ? style.border_color : "#2563eb",
        fill_opacity: Math.max(0, Math.min(0.5, Number(style.fill_opacity ?? 0.12))),
        border_width: Math.max(1, Math.min(4, Number.parseInt(style.border_width, 10) || 2))
      };
    }

    function applyHotspotStyle(element, style = {}, isSelected = false) {
      const normalized = normalizeStyle(style);
      const fillOpacity = isSelected ? Math.min(0.5, normalized.fill_opacity + 0.08) : normalized.fill_opacity;

      element.style.setProperty("--hotspot-fill", hexToRgba(normalized.fill_color, fillOpacity));
      element.style.setProperty("--hotspot-border-color", isSelected ? "#f97316" : normalized.border_color);
      element.style.setProperty("--hotspot-border-width", `${normalized.border_width}px`);
    }

    function productImages(hotspot) {
      const images = Array.isArray(hotspot?.product?.images) ? hotspot.product.images : [];
      const legacyImage = hotspot?.product?.image_url || hotspot?.image_url || "";

      return [...images, legacyImage]
        .map((imageUrl) => String(imageUrl || "").trim())
        .filter(Boolean)
        .filter((imageUrl, index, allImages) => allImages.indexOf(imageUrl) === index)
        .slice(0, 3);
    }

    function render() {
      setEditorZoom(state.zoom);
      setMobileTab(state.mobileTab);
      setMobilePlacing(state.mobilePlacing);
      const page = state.pages[state.currentPage - 1];
      el.pageImage.src = page?.image_url || "";
      el.pageImage.alt = `Seite ${state.currentPage}`;
      el.pageSelect.value = String(state.currentPage);

      el.pageCanvas.querySelectorAll(".hotspot,.draft").forEach((node) => node.remove());

      pageHotspots().forEach((hotspot) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `hotspot ${hotspot.id === state.selectedId ? "selected" : ""}`;
        if (state.interaction?.id === hotspot.id && state.interaction?.mode === "move") {
          button.classList.add("moving");
        }
        button.style.left = `${hotspot.position.left * 100}%`;
        button.style.top = `${hotspot.position.top * 100}%`;
        button.style.width = `${hotspot.position.width * 100}%`;
        button.style.height = `${hotspot.position.height * 100}%`;
        applyHotspotStyle(button, hotspot.style, hotspot.id === state.selectedId);
        button.title = hotspot.title || hotspot.type;
        button.addEventListener("click", (event) => {
          event.stopPropagation();
          selectHotspot(hotspot.id);
        });
        button.addEventListener("pointerdown", (event) => {
          beginHotspotMove(event, hotspot.id);
        });

        if (hotspot.id === state.selectedId) {
          ["nw", "ne", "sw", "se"].forEach((handle) => {
            const grip = document.createElement("span");
            grip.className = "resizeHandle";
            grip.dataset.handle = handle;
            grip.addEventListener("pointerdown", (event) => {
              beginHotspotResize(event, hotspot.id, handle);
            });
            button.appendChild(grip);
          });
        }
        el.pageCanvas.appendChild(button);
      });

      if (state.draft) {
        const draft = document.createElement("div");
        draft.className = "draft";
        draft.style.left = `${state.draft.left * 100}%`;
        draft.style.top = `${state.draft.top * 100}%`;
        draft.style.width = `${state.draft.width * 100}%`;
        draft.style.height = `${state.draft.height * 100}%`;
        el.pageCanvas.appendChild(draft);
      }

      renderList();
      fillForm();
      if (!state.selectedId) {
        openEditorPanel(false);
      }
    }

    function renderList() {
      el.hotspotList.innerHTML = "";

      state.hotspots
        .slice()
        .sort((a, b) => a.page - b.page)
        .forEach((hotspot) => {
          const item = document.createElement("button");
          item.type = "button";
          item.className = "listItem";
          item.innerHTML = `
            <strong>Seite ${hotspot.page}: ${escapeHtml(hotspot.title || hotspot.type)}</strong>
            <span>${escapeHtml(hotspot.type)} ${hotspot.url ? "- " + escapeHtml(hotspot.url) : ""}</span>
          `;
          item.addEventListener("click", () => {
            state.currentPage = hotspot.page;
            selectHotspot(hotspot.id);
          });
          el.hotspotList.appendChild(item);
        });
    }

    function selectHotspot(id) {
      state.selectedId = id;
      state.draft = null;
      render();
    }

    function fillForm() {
      const hotspot = currentHotspot();
      const disabled = !hotspot;

      [
        el.typeInput,
        el.titleInput,
        el.urlInput,
        el.targetPageInput,
        el.imageUrlInput,
        el.imageUploadInput,
        el.priceInput,
        el.descriptionInput,
        el.fillColorInput,
        el.borderColorInput,
        el.fillOpacityInput,
        el.borderWidthInput
      ].forEach((input) => {
        input.disabled = disabled;
      });

      if (!hotspot) {
        updateFieldVisibility("link");
        el.typeInput.value = "link";
        el.titleInput.value = "";
        el.urlInput.value = "";
        el.targetPageInput.value = "";
        el.imageUrlInput.value = "";
        el.imageUploadInput.value = "";
        renderProductImages(null);
        el.priceInput.value = "";
        el.descriptionInput.value = "";
        fillStyleForm();
        return;
      }

      el.typeInput.value = hotspot.type || "link";
      updateFieldVisibility(el.typeInput.value);
      el.titleInput.value = hotspot.title || "";
      el.urlInput.value = hotspot.url || hotspot.product?.url || "";
      el.targetPageInput.value = hotspot.target_page || "";
      el.imageUrlInput.value = hotspot.product?.image_url || hotspot.image_url || "";
      el.imageUploadInput.disabled = disabled || hotspot.type !== "product" || !canSave();
      el.imageUploadInput.value = "";
      renderProductImages(hotspot);
      el.priceInput.value = hotspot.product?.price || "";
      el.descriptionInput.value = hotspot.type === "note"
        ? hotspot.description || ""
        : hotspot.product?.description || "";
      fillStyleForm(hotspot);
    }

    function fillStyleForm(hotspot = null) {
      const style = normalizeStyle(hotspot?.style || {});
      el.fillColorInput.value = style.fill_color;
      el.borderColorInput.value = style.border_color;
      el.fillOpacityInput.value = String(Math.round(style.fill_opacity * 100));
      el.fillOpacityValue.innerText = `${el.fillOpacityInput.value}%`;
      el.borderWidthInput.value = String(style.border_width);
    }

    function renderProductImages(hotspot) {
      const images = productImages(hotspot);
      el.productImageList.innerHTML = "";

      images.forEach((imageUrl) => {
        const tile = document.createElement("div");
        tile.className = "imageTile";
        tile.innerHTML = `
          <img src="${escapeAttribute(imageUrl)}" alt="Produktbild" />
          <button type="button" title="Bild entfernen">X</button>
        `;
        tile.querySelector("button").addEventListener("click", () => {
          removeProductImage(imageUrl).catch((error) => setStatus(error.message));
        });
        el.productImageList.appendChild(tile);
      });

      if (!images.length) {
        el.productImageList.innerHTML = `<p class="hint">Noch keine Produktbilder hinterlegt.</p>`;
      }
    }

    function updateSelectedFromForm() {
      const hotspot = currentHotspot();
      if (!hotspot) return;

      hotspot.type = el.typeInput.value;
      hotspot.title = el.titleInput.value.trim();
      hotspot.label = hotspot.title;
      updateFieldVisibility(hotspot.type);
      hotspot.style = {
        fill_color: el.fillColorInput.value,
        border_color: el.borderColorInput.value,
        fill_opacity: Number(el.fillOpacityInput.value) / 100,
        border_width: Number(el.borderWidthInput.value) || 2
      };
      el.fillOpacityValue.innerText = `${el.fillOpacityInput.value}%`;

      delete hotspot.url;
      delete hotspot.target;
      delete hotspot.target_page;

      if (hotspot.type === "link" || hotspot.type === "video") {
        hotspot.url = el.urlInput.value.trim();
        hotspot.target = "_blank";
      }

      if (hotspot.type === "page") {
        hotspot.target_page = Number(el.targetPageInput.value) || hotspot.page;
      }

      if (hotspot.type === "product") {
        const manualImageUrl = el.imageUrlInput.value.trim();
        const images = productImages(hotspot);
        const finalImages = manualImageUrl
          ? [manualImageUrl, ...images.filter((imageUrl) => imageUrl !== manualImageUrl)].slice(0, 3)
          : images;

        hotspot.product = {
          ...(hotspot.product || {}),
          name: hotspot.title,
          price: el.priceInput.value.trim(),
          description: el.descriptionInput.value.trim(),
          image_url: finalImages[0] || "",
          images: finalImages,
          url: el.urlInput.value.trim()
        };
        hotspot.url = el.urlInput.value.trim();
        hotspot.target = "_blank";
      } else if (hotspot.type === "note") {
        delete hotspot.product;
        hotspot.description = el.descriptionInput.value.trim();
      } else {
        delete hotspot.product;
        delete hotspot.description;
      }

      el.imageUploadInput.disabled = hotspot.type !== "product" || !canSave();
      renderProductImages(hotspot);
      state.dirty = true;
      renderList();
    }

    function createHotspot(rect) {
      if (rect.width < 0.015 || rect.height < 0.015) {
        setStatus("Der markierte Bereich ist zu klein.");
        return;
      }

      const hotspot = {
        id: makeId(),
        type: "link",
        page: state.currentPage,
        title: "Neuer Link",
        label: "Neuer Link",
        show_icon: true,
        position: rect,
        style: normalizeStyle(),
        url: "",
        target: "_blank"
      };

      state.hotspots.push(hotspot);
      state.selectedId = hotspot.id;
      state.dirty = true;
      setStatus(isMobileEditor()
        ? "Hotspot erstellt. Zum Bearbeiten Details öffnen."
        : "Hotspot erstellt. Details rechts bearbeiten.");
      render();
    }

    function beginHotspotMove(event, hotspotId) {
      if (event.button !== 0) return;
      const hotspot = state.hotspots.find((entry) => entry.id === hotspotId);
      if (!hotspot) return;

      state.selectedId = hotspotId;
      state.draft = null;
      state.drawing = false;
      state.interaction = {
        mode: "move",
        id: hotspotId,
        startPoint: getRelativePoint(event),
        startRect: { ...hotspot.position }
      };
      el.pageCanvas.setPointerCapture?.(event.pointerId);
      event.stopPropagation();
      event.preventDefault();
      render();
    }

    function beginHotspotResize(event, hotspotId, handle) {
      if (event.button !== 0) return;
      const hotspot = state.hotspots.find((entry) => entry.id === hotspotId);
      if (!hotspot) return;

      state.selectedId = hotspotId;
      state.draft = null;
      state.drawing = false;
      state.interaction = {
        mode: "resize",
        id: hotspotId,
        handle,
        startPoint: getRelativePoint(event),
        startRect: { ...hotspot.position }
      };
      el.pageCanvas.setPointerCapture?.(event.pointerId);
      event.stopPropagation();
      event.preventDefault();
      render();
    }

    function updateInteraction(event) {
      if (!state.interaction) return;
      const hotspot = state.hotspots.find((entry) => entry.id === state.interaction.id);
      if (!hotspot) return;

      const point = getRelativePoint(event);
      const dx = point.x - state.interaction.startPoint.x;
      const dy = point.y - state.interaction.startPoint.y;

      hotspot.position = state.interaction.mode === "resize"
        ? resizeRect(state.interaction.startRect, dx, dy, state.interaction.handle)
        : moveRect(state.interaction.startRect, dx, dy);
      state.dirty = true;
      render();
    }

    function endInteraction() {
      if (!state.interaction) return false;
      state.interaction = null;
      setStatus("Hotspot angepasst.");
      render();
      return true;
    }

    async function load() {
      if (!catalogId) {
        setStatus("catalog Parameter fehlt.");
        return;
      }

      setStatus("Katalog wird geladen...");
      const response = await fetch(`${API_BASE}/api/smartviewer-v2/catalogs/${catalogId}`);
      if (!response.ok) throw new Error("Katalog konnte nicht geladen werden.");
      state.catalog = await response.json();
      state.pages = state.catalog.pages || [];
      state.hotspots = state.catalog.hotspots || [];

      if (canSave()) {
        const hotspotResponse = await fetch(hotspotEndpoint(), {
          headers: hotspotAuthHeaders()
        });
        if (hotspotResponse.ok) {
          const data = await hotspotResponse.json();
          state.hotspots = data.hotspots || state.hotspots;
        }
      }

      el.subtitle.innerText = state.catalog.title || "SmartCatalog";
      el.pageSelect.innerHTML = state.pages
        .map((page) => `<option value="${page.page}">Seite ${page.page}</option>`)
        .join("");
      el.openViewerBtn.onclick = () => {
        window.open(`${API_BASE}/smartviewer-v2/index.html?catalog=${catalogId}`, "_blank", "noopener");
      };

      render();
      setStatus(canSave() ? "Bereit." : "Vorschau-Modus: Zum Speichern Editor-Link aus dem Kundenportal öffnen.");
    }

    async function save() {
      if (!canSave()) {
        setStatus("Speichern nicht möglich: Editor-Link aus dem Kundenportal öffnen.");
        return;
      }

      updateSelectedFromForm();
      setStatus("Wird gespeichert...");
      await persistHotspots();
      setStatus("Gespeichert.");
      render();
    }

    async function persistHotspots() {
      const response = await fetch(hotspotEndpoint(), {
        method: "PUT",
        headers: {
          ...hotspotAuthHeaders(),
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ hotspots: state.hotspots })
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.error || "Hotspots konnten nicht gespeichert werden.");
      }

      const data = await response.json();
      state.hotspots = data.hotspots || state.hotspots;
      state.dirty = false;
    }

    async function uploadProductImages(files) {
      const hotspot = currentHotspot();
      if (!hotspot) {
        setStatus("Bitte zuerst einen Hotspot auswaehlen.");
        return;
      }

      if (hotspot.type !== "product") {
        setStatus("Bild-Upload ist nur fuer Produkt-Hotspots moeglich.");
        return;
      }

      if (!canSave()) {
        setStatus("Upload nicht moeglich: Editor-Link aus dem Kundenportal oeffnen.");
        return;
      }

      const fileList = Array.from(files || []);
      if (!fileList.length) return;

      if (productImages(hotspot).length + fileList.length > 3) {
        el.imageUploadInput.value = "";
        setStatus("Maximal 3 Produktbilder pro Hotspot erlaubt.");
        return;
      }

      updateSelectedFromForm();
      await persistHotspots();
      state.selectedId = hotspot.id;
      const formData = new FormData();
      fileList.forEach((file) => formData.append("images", file));

      setStatus("Produktbilder werden hochgeladen...");
      const response = await fetch(productImageEndpoint(hotspot.id), {
        method: "POST",
        headers: hotspotAuthHeaders(),
        body: formData
      });

      el.imageUploadInput.value = "";

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.error || "Produktbilder konnten nicht hochgeladen werden.");
      }

      const data = await response.json();
      state.hotspots = data.hotspots || state.hotspots;
      state.selectedId = hotspot.id;
      state.dirty = false;
      setStatus("Produktbilder gespeichert.");
      render();
    }

    async function removeProductImage(imageUrl) {
      const hotspot = currentHotspot();
      if (!hotspot) return;

      if (!canSave()) {
        const images = productImages(hotspot).filter((currentUrl) => currentUrl !== imageUrl);
        hotspot.product = {
          ...(hotspot.product || {}),
          images,
          image_url: images[0] || ""
        };
        state.dirty = true;
        render();
        setStatus("Bild lokal entfernt. Zum Speichern Editor-Link aus dem Kundenportal oeffnen.");
        return;
      }

      const response = await fetch(productImageEndpoint(hotspot.id), {
        method: "DELETE",
        headers: {
          ...hotspotAuthHeaders(),
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ image_url: imageUrl })
      });

      if (!response.ok) {
        const error = await response.json().catch(() => ({}));
        throw new Error(error.error || "Produktbild konnte nicht entfernt werden.");
      }

      const data = await response.json();
      state.hotspots = data.hotspots || state.hotspots;
      state.selectedId = hotspot.id;
      state.dirty = false;
      setStatus("Produktbild entfernt.");
      render();
    }

    function deleteSelected() {
      if (!state.selectedId) return;
      state.hotspots = state.hotspots.filter((hotspot) => hotspot.id !== state.selectedId);
      state.selectedId = "";
      state.dirty = true;
      render();
      setStatus("Hotspot gelöscht.");
    }

    function createMobileHotspot() {
      openEditorPanel(false);
      setMobilePlacing(!state.mobilePlacing);
      setStatus(state.mobilePlacing
        ? "Platzierungsmodus: Tippe auf die gewünschte Stelle im Katalog."
        : "Platzierungsmodus beendet.");
    }

    function getTouchDistance(touches) {
      const dx = touches[0].clientX - touches[1].clientX;
      const dy = touches[0].clientY - touches[1].clientY;
      return Math.hypot(dx, dy);
    }

    function getTouchCenter(touches) {
      return {
        x: (touches[0].clientX + touches[1].clientX) / 2,
        y: (touches[0].clientY + touches[1].clientY) / 2
      };
    }

    function startMobilePinch(event) {
      if (!isMobileEditor() || event.touches.length !== 2) return;
      state.pinch = {
        distance: getTouchDistance(event.touches),
        zoom: state.zoom
      };
      setMobilePlacing(false);
      event.preventDefault();
    }

    function moveMobilePinch(event) {
      if (!isMobileEditor() || !state.pinch || event.touches.length !== 2) return;
      const distance = getTouchDistance(event.touches);
      if (!state.pinch.distance) return;
      setEditorZoom(state.pinch.zoom * (distance / state.pinch.distance), getTouchCenter(event.touches));
      event.preventDefault();
    }

    function endMobilePinch(event) {
      if (event.touches.length < 2) {
        state.pinch = null;
      }
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function escapeAttribute(value) {
      return escapeHtml(value);
    }

    el.pageCanvas.addEventListener("pointerdown", (event) => {
      if (event.button !== 0) return;
      const target = event.target;
      const isCanvasSurface = target === el.pageCanvas || target === el.pageImage || target === el.pageCanvasWrap;
      if (!isCanvasSurface) return;

      if (isMobileEditor()) {
        if (state.pinch) return;
        if (!state.mobilePlacing) return;
        const point = getRelativePoint(event);
        createHotspot(defaultRectAt(point));
        setMobileTab("content");
        setMobilePlacing(false);
        setStatus("Hotspot platziert. Ziehen zum Verschieben oder Details öffnen.");
        event.preventDefault();
        return;
      }

      state.drawing = true;
      state.drawStart = getRelativePoint(event);
      state.draft = { ...state.drawStart, width: 0, height: 0 };
      el.pageCanvas.setPointerCapture?.(event.pointerId);
      event.preventDefault();
      render();
    });

    el.pageCanvas.addEventListener("pointermove", (event) => {
      if (state.interaction) {
        updateInteraction(event);
        return;
      }

      if (!state.drawing || !state.drawStart) return;
      state.draft = normalizeRect(state.drawStart, getRelativePoint(event));
      render();
    });

    el.pageCanvas.addEventListener("pointerup", (event) => {
      if (endInteraction()) return;
      if (!state.drawing || !state.draft) return;
      const rect = state.draft;
      const point = state.drawStart;
      state.drawing = false;
      state.draft = null;
      createHotspot(
        rect.width < 0.015 && rect.height < 0.015 && event.pointerType === "touch"
          ? defaultRectAt(point)
          : rect
      );
    });

    el.pageCanvas.addEventListener("pointercancel", () => {
      state.drawing = false;
      state.draft = null;
      state.interaction = null;
      render();
    });
    el.pageCanvasWrap.addEventListener("touchstart", startMobilePinch, { passive: false });
    el.pageCanvasWrap.addEventListener("touchmove", moveMobilePinch, { passive: false });
    el.pageCanvasWrap.addEventListener("touchend", endMobilePinch, { passive: false });
    el.pageCanvasWrap.addEventListener("touchcancel", endMobilePinch, { passive: false });

    el.pageSelect.addEventListener("change", () => {
      state.currentPage = Number(el.pageSelect.value) || 1;
      state.selectedId = "";
      render();
    });
    document.getElementById("prevPageBtn").addEventListener("click", () => {
      state.currentPage = Math.max(1, state.currentPage - 1);
      state.selectedId = "";
      render();
    });
    document.getElementById("nextPageBtn").addEventListener("click", () => {
      state.currentPage = Math.min(state.pages.length, state.currentPage + 1);
      state.selectedId = "";
      render();
    });
    document.getElementById("deleteBtn").addEventListener("click", deleteSelected);
    document.getElementById("clearBtn").addEventListener("click", () => {
      state.selectedId = "";
      openEditorPanel(false);
      render();
    });
    el.saveBtn.addEventListener("click", () => {
      save().catch((error) => setStatus(error.message));
    });
    el.mobileAddBtn.addEventListener("click", createMobileHotspot);
    el.mobileDetailsBtn.addEventListener("click", () => {
      if (!state.selectedId) {
        setStatus("Bitte zuerst einen Hotspot auswählen.");
        return;
      }
      setMobileTab("content");
      openEditorPanel(true);
      setStatus("Details bearbeiten.");
    });
    el.mobileDeleteBtn.addEventListener("click", () => {
      if (!state.selectedId) {
        setStatus("Bitte zuerst einen Hotspot auswählen.");
        return;
      }
      deleteSelected();
    });
    el.mobileSheetHandle.addEventListener("pointerdown", startSheetDrag);
    el.mobileSheetHandle.addEventListener("pointermove", moveSheetDrag);
    el.mobileSheetHandle.addEventListener("pointerup", endSheetDrag);
    el.mobileSheetHandle.addEventListener("pointercancel", endSheetDrag);
    el.mobileSheetHandle.addEventListener("click", () => {
      if (state.sheetDrag || state.ignoreSheetClick) return;
      openEditorPanel(!el.editorPanel.classList.contains("open"));
    });
    el.mobileCollapseBtn.addEventListener("click", () => openEditorPanel(false));
    el.mobilePanelSaveBtn.addEventListener("click", () => {
      save()
        .then(() => {
          if (isMobileEditor()) openEditorPanel(false);
        })
        .catch((error) => setStatus(error.message));
    });
    el.mobileContentTabBtn.addEventListener("click", () => setMobileTab("content"));
    el.mobileStyleTabBtn.addEventListener("click", () => setMobileTab("style"));
    window.addEventListener("resize", () => setEditorZoom(isMobileEditor() ? state.zoom : 1));
    [
      el.typeInput,
      el.titleInput,
      el.urlInput,
      el.targetPageInput,
      el.imageUrlInput,
      el.priceInput,
      el.descriptionInput,
      el.fillColorInput,
      el.borderColorInput,
      el.fillOpacityInput,
      el.borderWidthInput
    ].forEach((input) => input.addEventListener("input", updateSelectedFromForm));
    el.imageUploadInput.addEventListener("change", () => {
      uploadProductImages(el.imageUploadInput.files).catch((error) => setStatus(error.message));
    });

    load().catch((error) => setStatus(error.message));
  </script>
</body>
</html>
