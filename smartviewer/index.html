<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartCatalog Viewer</title>

  <script src="https://unpkg.com/page-flip/dist/js/page-flip.browser.js"></script>

  <style>
    :root {
      color-scheme: light;
      --surface: #ffffff;
      --surface-soft: #f6f7f9;
      --ink: #111827;
      --muted: #667085;
      --line: #d9dee8;
      --accent: #2563eb;
      --accent-strong: #1d4ed8;
      --stage: #dfe3ea;
      --shadow: 0 18px 55px rgba(15, 23, 42, 0.18);
      --toolbar-height: 70px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: var(--stage);
      color: var(--ink);
      font-family: Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      min-height: var(--toolbar-height);
      display: grid;
      grid-template-columns: minmax(180px, 1fr) auto minmax(180px, 1fr);
      align-items: center;
      gap: 16px;
      padding: 10px 22px;
      background: rgba(255, 255, 255, 0.94);
      border-bottom: 1px solid var(--line);
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      z-index: 10;
      backdrop-filter: blur(10px);
    }

    #brand {
      min-width: 0;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    #logoWrap {
      width: 44px;
      height: 44px;
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      flex: 0 0 auto;
    }

    #logo {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    #titleBlock {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    #customerName,
    #catalogTitle {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    #customerName {
      font-weight: 700;
      font-size: 15px;
    }

    #catalogTitle {
      color: var(--muted);
      font-size: 13px;
    }

    #pageInfo {
      min-width: 120px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      font-weight: 700;
    }

    #controls {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 8px;
    }

    button {
      height: 38px;
      min-width: 38px;
      border: 1px solid transparent;
      border-radius: 8px;
      background: #171717;
      color: #fff;
      cursor: pointer;
      font-size: 14px;
      font-weight: 700;
      line-height: 1;
      transition: transform 120ms ease, background 120ms ease, opacity 120ms ease;
    }

    button:hover {
      background: #000;
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }

    .control-button {
      padding: 0 12px;
    }

    .icon-button {
      padding: 0;
    }

    #viewer {
      position: relative;
      flex: 1;
      overflow: hidden;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        linear-gradient(135deg, rgba(255, 255, 255, 0.36), rgba(255, 255, 255, 0)),
        var(--stage);
      cursor: grab;
      touch-action: none;
    }

    #viewer.dragging {
      cursor: grabbing;
    }

    #zoomWrap {
      transform-origin: center center;
      transition: transform 90ms ease;
      will-change: transform;
    }

    #book {
      background: transparent;
      filter: drop-shadow(var(--shadow));
    }

    .page {
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      background: #fff;
    }

    .page img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      user-select: none;
      pointer-events: none;
    }

    #status {
      position: absolute;
      color: var(--muted);
      font-size: 15px;
      z-index: 2;
    }

    #intro {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(255, 255, 255, 0.96), rgba(238, 242, 247, 0.96)),
        var(--surface-soft);
      z-index: 50;
      transition: opacity 420ms ease, visibility 420ms ease;
    }

    #intro.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    #introPanel {
      width: min(420px, calc(100vw - 40px));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 18px;
      text-align: center;
    }

    #introLogoWrap {
      width: 86px;
      height: 86px;
      display: none;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 14px;
      background: #fff;
      box-shadow: 0 16px 36px rgba(15, 23, 42, 0.12);
    }

    #introLogo {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    #introTitle {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
    }

    #introText {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }

    #progressTrack {
      width: 100%;
      height: 5px;
      overflow: hidden;
      border-radius: 999px;
      background: #d8dee9;
    }

    #progressBar {
      width: 0%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--accent), var(--accent-strong));
      transition: width 220ms ease;
    }

    @media (max-width: 860px) {
      :root {
        --toolbar-height: 118px;
      }

      #toolbar {
        grid-template-columns: 1fr;
        gap: 8px;
        padding: 9px 12px;
      }

      #brand {
        justify-content: center;
      }

      #controls {
        justify-content: center;
        flex-wrap: wrap;
      }

      #customerName {
        font-size: 14px;
      }

      #catalogTitle {
        font-size: 12px;
      }

      #pageInfo {
        min-width: auto;
        order: 3;
      }

      .control-button {
        padding: 0 10px;
      }
    }

    @media (max-width: 520px) {
      button {
        height: 36px;
        font-size: 13px;
      }

      #logoWrap {
        width: 38px;
        height: 38px;
      }

      .control-label {
        display: none;
      }
    }
  </style>
</head>

<body>
  <header id="toolbar">
    <div id="brand">
      <div id="logoWrap">
        <img id="logo" alt="" />
      </div>
      <div id="titleBlock">
        <div id="customerName">SmartCatalog</div>
        <div id="catalogTitle">Katalog wird geladen...</div>
      </div>
    </div>

    <div id="pageInfo">Seite - / -</div>

    <div id="controls">
      <button class="control-button" type="button" onclick="prevPage()">&larr; <span class="control-label">Zurueck</span></button>
      <button class="control-button" type="button" onclick="nextPage()"><span class="control-label">Weiter</span> &rarr;</button>
      <button class="icon-button" type="button" title="Zoom kleiner" onclick="zoomOut()">-</button>
      <button class="icon-button" type="button" title="Zoom groesser" onclick="zoomIn()">+</button>
      <button class="control-button" type="button" onclick="resetZoom()">Reset</button>
      <button class="control-button" type="button" onclick="toggleFullscreen()">Vollbild</button>
    </div>
  </header>

  <main id="viewer">
    <div id="status">Katalog wird geladen...</div>
    <div id="zoomWrap">
      <div id="book"></div>
    </div>
  </main>

  <div id="intro">
    <div id="introPanel">
      <div id="introLogoWrap">
        <img id="introLogo" alt="" />
      </div>
      <h1 id="introTitle">SmartCatalog</h1>
      <p id="introText">Ihr Katalog wird vorbereitet.</p>
      <div id="progressTrack">
        <div id="progressBar"></div>
      </div>
    </div>
  </div>

<script>
  const params = new URLSearchParams(window.location.search);
  const API_BASE = params.get("api_base") || window.location.origin;
  const catalogId = params.get("catalog");

  const viewerEl = document.getElementById("viewer");
  const zoomWrap = document.getElementById("zoomWrap");
  const bookEl = document.getElementById("book");
  const statusEl = document.getElementById("status");
  const pageInfoEl = document.getElementById("pageInfo");
  const customerNameEl = document.getElementById("customerName");
  const catalogTitleEl = document.getElementById("catalogTitle");
  const logoWrapEl = document.getElementById("logoWrap");
  const logoEl = document.getElementById("logo");
  const introEl = document.getElementById("intro");
  const introTitleEl = document.getElementById("introTitle");
  const introTextEl = document.getElementById("introText");
  const introLogoWrapEl = document.getElementById("introLogoWrap");
  const introLogoEl = document.getElementById("introLogo");
  const progressBarEl = document.getElementById("progressBar");

  let pageFlip = null;
  let totalPages = 0;
  let zoomLevel = 1;
  let panX = 0;
  let panY = 0;
  let isPointerDown = false;
  let isDragging = false;
  let dragStartX = 0;
  let dragStartY = 0;
  let startPanX = 0;
  let startPanY = 0;
  let resizeTimer = null;

  if (!catalogId) {
    statusEl.innerText = "Kein Katalog angegeben.";
    introTextEl.innerText = "Kein Katalog angegeben.";
    throw new Error("Kein catalog Parameter");
  }

  function setProgress(percent, text) {
    progressBarEl.style.width = `${Math.max(0, Math.min(percent, 100))}%`;
    if (text) introTextEl.innerText = text;
  }

  function hideIntro() {
    setProgress(100, "Bereit.");
    window.setTimeout(() => {
      introEl.classList.add("hidden");
    }, 360);
  }

  function setBranding(settings) {
    const customer = settings?.customer || {};
    const title = settings?.title || "SmartCatalog";
    const customerName = customer.company_name || "SmartCatalog";
    const logoUrl = customer.logo_url || "";

    document.title = title;
    customerNameEl.innerText = customerName;
    catalogTitleEl.innerText = title;
    introTitleEl.innerText = customerName;

    if (logoUrl) {
      logoEl.src = logoUrl;
      introLogoEl.src = logoUrl;
      logoWrapEl.style.display = "flex";
      introLogoWrapEl.style.display = "flex";
    }
  }

  async function loadViewerSettings() {
    try {
      const response = await fetch(`${API_BASE}/api/viewer-settings/${catalogId}`);
      if (!response.ok) return;
      const settings = await response.json();
      setBranding(settings);
    } catch (error) {
      console.warn("Viewer-Einstellungen konnten nicht geladen werden:", error.message);
    }
  }

  function updatePageInfo() {
    if (!pageFlip) return;
    const current = pageFlip.getCurrentPageIndex() + 1;
    pageInfoEl.innerText = `Seite ${current} / ${totalPages}`;
  }

  function nextPage() {
    if (pageFlip && !isDragging) pageFlip.flipNext();
  }

  function prevPage() {
    if (pageFlip && !isDragging) pageFlip.flipPrev();
  }

  function applyZoom() {
    zoomWrap.style.transform =
      `translate(${panX}px, ${panY}px) scale(${zoomLevel})`;
  }

  function zoomIn() {
    zoomLevel = Math.min(zoomLevel + 0.15, 2.5);
    applyZoom();
  }

  function zoomOut() {
    zoomLevel = Math.max(zoomLevel - 0.15, 0.7);
    applyZoom();
  }

  function resetZoom() {
    zoomLevel = 1;
    panX = 0;
    panY = 0;
    zoomWrap.style.transformOrigin = "center center";
    applyZoom();
  }

  function toggleFullscreen() {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen?.();
    } else {
      document.exitFullscreen?.();
    }
  }

  function beginDrag(clientX, clientY) {
    isPointerDown = true;
    isDragging = false;
    dragStartX = clientX;
    dragStartY = clientY;
    startPanX = panX;
    startPanY = panY;
  }

  function moveDrag(clientX, clientY, event) {
    if (!isPointerDown) return;

    const deltaX = clientX - dragStartX;
    const deltaY = clientY - dragStartY;

    if (Math.abs(deltaX) > 6 || Math.abs(deltaY) > 6) {
      isDragging = true;
    }

    if (isDragging) {
      panX = startPanX + deltaX;
      panY = startPanY + deltaY;
      viewerEl.classList.add("dragging");
      applyZoom();
      event?.preventDefault();
    }
  }

  function endDrag() {
    isPointerDown = false;
    viewerEl.classList.remove("dragging");
    window.setTimeout(() => {
      isDragging = false;
    }, 120);
  }

  viewerEl.addEventListener("wheel", (event) => {
    event.preventDefault();

    const rect = zoomWrap.getBoundingClientRect();
    const originX = event.clientX - rect.left;
    const originY = event.clientY - rect.top;

    zoomWrap.style.transformOrigin = `${originX}px ${originY}px`;

    const direction = event.deltaY < 0 ? 1 : -1;
    zoomLevel = Math.min(Math.max(zoomLevel + direction * 0.1, 0.7), 2.5);

    applyZoom();
  }, { passive: false });

  viewerEl.addEventListener("pointerdown", (event) => {
    if (event.pointerType === "mouse" && event.button !== 0) return;
    viewerEl.setPointerCapture?.(event.pointerId);
    beginDrag(event.clientX, event.clientY);
  });

  viewerEl.addEventListener("pointermove", (event) => {
    moveDrag(event.clientX, event.clientY, event);
  });

  viewerEl.addEventListener("pointerup", endDrag);
  viewerEl.addEventListener("pointercancel", endDrag);

  viewerEl.addEventListener("click", (event) => {
    if (isDragging) {
      event.preventDefault();
      event.stopPropagation();
    }
  }, true);

  async function imageExists(url) {
    try {
      const response = await fetch(url, { method: "HEAD" });
      return response.ok;
    } catch {
      return false;
    }
  }

  function loadImage(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.onload = () => resolve(img);
      img.onerror = reject;
      img.src = url;
    });
  }

  async function loadPages() {
    const pages = [];
    let pageNumber = 1;

    while (true) {
      const url = `${API_BASE}/catalog-pages/${catalogId}/page-${pageNumber}.jpg`;
      const exists = await imageExists(url);

      if (!exists) break;

      const img = await loadImage(url);
      const pageDiv = document.createElement("div");
      pageDiv.className = "page";
      pageDiv.appendChild(img);

      pages.push({
        element: pageDiv,
        width: img.naturalWidth,
        height: img.naturalHeight
      });

      setProgress(Math.min(88, 18 + pageNumber * 8), `${pageNumber} Seite(n) geladen...`);
      pageNumber++;
    }

    return pages;
  }

  function calculateBookSize(firstPage) {
    const viewerRect = viewerEl.getBoundingClientRect();
    const toolbarHeight = document.getElementById("toolbar").getBoundingClientRect().height;
    const availableWidth = viewerRect.width * 0.94;
    const availableHeight = Math.max(viewerRect.height - toolbarHeight * 0.08, 240) * 0.92;
    const pageRatio = firstPage.width / firstPage.height;
    const isMobile = viewerRect.width < 820;

    let pageWidth = availableHeight * pageRatio;
    let pageHeight = availableHeight;

    if (isMobile) {
      if (pageWidth > availableWidth) {
        pageWidth = availableWidth;
        pageHeight = pageWidth / pageRatio;
      }
    } else if (pageWidth * 2 > availableWidth) {
      pageWidth = availableWidth / 2;
      pageHeight = pageWidth / pageRatio;
    }

    return {
      pageWidth: Math.floor(pageWidth),
      pageHeight: Math.floor(pageHeight),
      isMobile
    };
  }

  async function start() {
    try {
      setProgress(8, "Einstellungen werden geladen...");
      await loadViewerSettings();

      statusEl.innerText = "Seiten werden geladen...";
      setProgress(18, "Seiten werden geladen...");

      const loadedPages = await loadPages();

      if (!loadedPages.length) {
        statusEl.innerText = "Keine Seiten gefunden.";
        setProgress(100, "Keine Seiten gefunden.");
        return;
      }

      totalPages = loadedPages.length;
      const size = calculateBookSize(loadedPages[0]);

      bookEl.style.width = `${size.pageWidth * (size.isMobile ? 1 : 2)}px`;
      bookEl.style.height = `${size.pageHeight}px`;

      const pageElements = loadedPages.map((page) => page.element);

      pageFlip = new St.PageFlip(bookEl, {
        width: size.pageWidth,
        height: size.pageHeight,
        size: "fixed",
        showCover: false,
        usePortrait: size.isMobile,
        mobileScrollSupport: false,
        flippingTime: 650,
        drawShadow: true,
        maxShadowOpacity: 0.35,
        disableFlipByClick: false
      });

      pageFlip.loadFromHTML(pageElements);
      pageFlip.on("flip", updatePageInfo);

      statusEl.style.display = "none";
      resetZoom();
      updatePageInfo();
      hideIntro();
    } catch (error) {
      console.error(error);
      statusEl.innerText = "Fehler beim Laden des Katalogs.";
      setProgress(100, "Fehler beim Laden des Katalogs.");
    }
  }

  window.addEventListener("resize", () => {
    window.clearTimeout(resizeTimer);
    resizeTimer = window.setTimeout(() => location.reload(), 220);
  });

  document.addEventListener("keydown", (event) => {
    if (event.key === "ArrowRight") nextPage();
    if (event.key === "ArrowLeft") prevPage();
    if (event.key === "+") zoomIn();
    if (event.key === "-") zoomOut();
    if (event.key === "0") resetZoom();
  });

  start();
</script>
</body>
</html>
